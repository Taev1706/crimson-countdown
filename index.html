<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CRIMSON DESERT — Обратный Отсчёт</title>

<meta property="og:title" content="Crimson Desert — Обратный Отсчёт">
<meta property="og:description" content="Долгожданный релиз Crimson Desert. Узнай, сколько времени осталось до выхода игры!">
<meta property="og:image" content="https://crimsondesert.pearlabyss.com/assets/img/og_image.jpg">
<meta property="og:url" content="https://твоя-ссылка.com">
<meta name="twitter:card" content="summary_large_image">

<style>
  /* ========================================
   * CRIMSON DESERT COUNTDOWN - ULTIMATE EDITION
   * Release: 20 March 2026, 01:00 MSK
   * ======================================== */

  :root {
    --mouse-x: 0;
    --mouse-y: 0;
  }

  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #080604;
    font-family: 'Cinzel', 'Georgia', 'Times New Roman', serif;
    cursor: default;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* === BACKGROUND LAYERS (Parallax) === */
  .bg-container {
    position: fixed;
    inset: -5%; /* Расширяем для параллакса */
    z-index: 0;
    transition: transform 0.1s linear;
    transform: translate(calc(var(--mouse-x) * 1%), calc(var(--mouse-y) * 1%));
  }

  .bg {
    width: 100%;
    height: 100%;
    background-color: #080604;
    background-image: url('bg.webp'); /* Замени на свой фон */
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
    filter: brightness(0.5) saturate(1.15);
    transition: filter 2s ease;
  }
  .bg--celebrate { filter: brightness(0.65) saturate(1.3); }

  .overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: linear-gradient(180deg, rgba(8, 4, 0, 0.65) 0%, rgba(8, 4, 0, 0.20) 35%, rgba(8, 4, 0, 0.25) 65%, rgba(8, 4, 0, 0.80) 100%);
    pointer-events: none;
  }

  .vignette {
    position: fixed;
    inset: 0;
    z-index: 2;
    box-shadow: inset 0 0 200px rgba(0, 0, 0, 0.65);
    pointer-events: none;
  }

  /* === EMBERS === */
  .embers {
    position: fixed;
    inset: -5%; /* Для параллакса */
    z-index: 3;
    pointer-events: none;
    overflow: hidden;
    transform: translate(calc(var(--mouse-x) * 2%), calc(var(--mouse-y) * 2%));
  }
  .ember {
    position: absolute;
    bottom: -10px;
    border-radius: 50%;
    will-change: transform, opacity;
    animation: ember-rise linear infinite;
  }
  @keyframes ember-rise {
    0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
    8% { opacity: 0.9; }
    85% { opacity: 0.5; }
    100% { transform: translateY(calc(-105vh - 30px)) translateX(var(--drift)) scale(0.2); opacity: 0; }
  }

  /* === FIREWORKS === */
  #fireworks-canvas {
    position: fixed;
    inset: 0;
    z-index: 5;
    pointer-events: none;
  }

  /* === MAIN CONTENT === */
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    text-align: center;
    color: #fff;
    padding: 1rem;
  }

  .countdown-section, .celebrate-section {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .hidden { display: none !important; }

  /* Скрытый текст для скринридеров (A11y) */
  .sr-only {
    position: absolute;
    width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0, 0, 0, 0); border: 0;
  }

  .logo {
    font-weight: 900;
    font-size: clamp(1.8rem, 5.5vw, 4.5rem);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #e8c47c;
    text-shadow: 0 0 40px rgba(200, 140, 50, 0.45), 0 0 80px rgba(200, 100, 30, 0.25), 0 2px 4px rgba(0, 0, 0, 0.8);
    margin-bottom: 0.15em;
    animation: fade-in-down 1s ease-out both;
  }

  .subtitle {
    font-weight: 400;
    font-size: clamp(0.65rem, 1.8vw, 1.1rem);
    color: rgba(232, 196, 124, 0.65);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    margin-bottom: 1.8em;
    animation: fade-in-down 1s 0.25s ease-out both;
  }

  .timer {
    display: flex;
    align-items: flex-start;
    gap: clamp(0.5rem, 2.5vw, 2rem);
    animation: fade-in-up 1s 0.5s ease-out both;
  }

  .timer-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: clamp(50px, 11vw, 110px);
  }

  .timer-value {
    font-weight: 900;
    font-size: clamp(2.2rem, 7.5vw, 5.5rem);
    color: #fff;
    line-height: 1;
    text-shadow: 0 0 25px rgba(200, 100, 30, 0.35), 0 2px 6px rgba(0, 0, 0, 0.6);
    position: relative;
    font-variant-numeric: tabular-nums;
    min-width: 1.3em;
    text-align: center;
    transition: color 0.3s, text-shadow 0.3s;
  }
  .timer-value::after {
    content: ''; position: absolute; bottom: -3px; left: 15%; right: 15%; height: 1.5px;
    background: linear-gradient(90deg, transparent, rgba(232, 196, 124, 0.45), transparent);
  }

  /* Драматичный эффект последних 10 секунд */
  .timer--dramatic .timer-value {
    color: #ff3333;
    animation: heartbeat 1s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
  }
  .timer--dramatic .timer-value::after {
    background: linear-gradient(90deg, transparent, rgba(255, 50, 50, 0.7), transparent);
  }

  .timer-label {
    font-size: clamp(0.5rem, 1.2vw, 0.78rem);
    color: rgba(232, 196, 124, 0.55);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-top: 0.65em;
  }

  .timer-sep {
    font-size: clamp(1.8rem, 5.5vw, 3.5rem);
    color: rgba(232, 196, 124, 0.35);
    margin-top: 0.08em;
    animation: sep-pulse 1.5s ease-in-out infinite;
    user-select: none;
  }

  .release-date {
    font-size: clamp(0.6rem, 1.3vw, 0.85rem);
    color: rgba(255, 255, 255, 0.4);
    letter-spacing: 0.15em;
    margin-top: 2em;
    animation: fade-in-up 1s 0.75s ease-out both;
  }

  /* UI Кнопки */
  .ui-controls {
    position: fixed;
    bottom: 1.2rem;
    left: 1.2rem;
    right: 1.2rem;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
  }
  .ui-group {
    display: flex;
    gap: 10px;
    pointer-events: auto;
  }

  .btn {
    background: rgba(232, 196, 124, 0.12);
    border: 1px solid rgba(232, 196, 124, 0.25);
    color: rgba(232, 196, 124, 0.75);
    font-family: 'Cinzel', 'Georgia', serif;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.55em 1.1em;
    cursor: pointer;
    border-radius: 3px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: all 0.3s;
    user-select: none;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .btn:hover { background: rgba(232, 196, 124, 0.22); border-color: rgba(232, 196, 124, 0.45); color: #e8c47c; }
  .btn:active { transform: scale(0.97); }
  .fs-btn--hidden { opacity: 0; pointer-events: none; }

  /* Celebrate State */
  .celebrate-title {
    font-weight: 900;
    font-size: clamp(1.6rem, 5.5vw, 4.2rem);
    color: #ffcc44;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    line-height: 1.15;
    text-shadow: 0 0 50px rgba(255, 180, 50, 0.65), 0 0 100px rgba(255, 120, 30, 0.35), 0 4px 8px rgba(0, 0, 0, 0.8);
    animation: celebrate-in 0.9s ease-out both, glow-pulse 1.8s 0.9s ease-in-out infinite alternate;
  }
  .celebrate-sub {
    font-size: clamp(0.9rem, 2.5vw, 1.6rem);
    color: rgba(255, 220, 130, 0.8);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 0.5em;
    animation: fade-in-up 0.8s 0.3s ease-out both;
  }

  /* Animations */
  @keyframes fade-in-down { from { opacity: 0; transform: translateY(-25px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fade-in-up { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes sep-pulse { 0%, 100% { opacity: 0.35; } 50% { opacity: 0.75; } }
  @keyframes celebrate-in { from { opacity: 0; transform: scale(0.65); } to { opacity: 1; transform: scale(1); } }
  @keyframes glow-pulse {
    from { text-shadow: 0 0 40px rgba(255, 180, 50, 0.5), 0 4px 8px rgba(0, 0, 0, 0.8); }
    to { text-shadow: 0 0 90px rgba(255, 180, 50, 0.85), 0 4px 8px rgba(0, 0, 0, 0.8); }
  }
  @keyframes heartbeat {
    0% { transform: scale(1); text-shadow: 0 0 25px rgba(255, 50, 50, 0.5); }
    15% { transform: scale(1.15); text-shadow: 0 0 50px rgba(255, 50, 50, 0.9); }
    30% { transform: scale(1); text-shadow: 0 0 25px rgba(255, 50, 50, 0.5); }
    45% { transform: scale(1.15); text-shadow: 0 0 50px rgba(255, 50, 50, 0.9); }
    60%, 100% { transform: scale(1); }
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

<audio id="audio-ambient" loop src="ambient.mp3" preload="auto"></audio> 
<audio id="audio-release" src="release.mp3" preload="auto"></audio>

<div class="bg-container"><div class="bg" id="bg"></div></div>
<div class="overlay"></div>
<div class="vignette"></div>
<div class="embers" id="embers"></div>
<canvas id="fireworks-canvas"></canvas>

<div class="content">
  <div class="countdown-section" id="countdown-section" aria-live="polite">
    <div class="logo">Crimson Desert</div>
    <div class="subtitle" id="loc-sub">До выхода осталось</div>
    
    <div class="sr-only" id="a11y-text">Загрузка таймера...</div>

    <div class="timer" id="timer" aria-hidden="true">
      <div class="timer-block" id="days-block">
        <div class="timer-value" id="t-days">00</div>
        <div class="timer-label" id="loc-days">Дней</div>
      </div>
      <div class="timer-sep" id="sep-dh">:</div>
      <div class="timer-block">
        <div class="timer-value" id="t-hours">00</div>
        <div class="timer-label" id="loc-hours">Часов</div>
      </div>
      <div class="timer-sep">:</div>
      <div class="timer-block">
        <div class="timer-value" id="t-mins">00</div>
        <div class="timer-label" id="loc-mins">Минут</div>
      </div>
      <div class="timer-sep">:</div>
      <div class="timer-block">
        <div class="timer-value" id="t-secs">00</div>
        <div class="timer-label" id="loc-secs">Секунд</div>
      </div>
    </div>
    <div class="release-date" id="loc-date">20 марта 2026 · 01:00 МСК</div>
  </div>

  <div class="celebrate-section hidden" id="celebrate-section">
    <div class="celebrate-title" id="loc-cel-title">Быстро всем играть!</div>
    <div class="celebrate-sub" id="loc-cel-sub">Crimson Desert вышла!</div>
  </div>
</div>

<div class="ui-controls">
  <div class="ui-group">
    <button class="btn" id="sound-btn" type="button">🔇 Звук: Выкл</button>
    <a href="#" class="btn" id="cal-btn" download="crimson-desert-release.ics">📅 В календарь</a>
  </div>
  <div class="ui-group">
    <button class="btn" id="fs-btn" type="button">⛶ Экран</button>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ==============================================
  // КОНФИГУРАЦИЯ И ЛОКАЛИЗАЦИЯ (i18n)
  // ==============================================
  const RELEASE_MS = Date.UTC(2026, 2, 19, 22, 0, 0); // 19 March 2026 22:00:00 UTC
  
  const dict = {
    ru: {
      sub: "До выхода осталось", days: "Дней", hours: "Часов", mins: "Минут", secs: "Секунд",
      date: "20 марта 2026 · 01:00 МСК", celTitle: "Быстро всем играть!", celSub: "Crimson Desert вышла!",
      soundOn: "🔊 Звук: Вкл", soundOff: "🔇 Звук: Выкл", cal: "📅 В календарь", fs: "⛶ Экран"
    },
    en: {
      sub: "Time until release", days: "Days", hours: "Hours", mins: "Minutes", secs: "Seconds",
      date: "March 19, 2026 · 22:00 UTC", celTitle: "Play Now!", celSub: "Crimson Desert is out!",
      soundOn: "🔊 Sound: On", soundOff: "🔇 Sound: Off", cal: "📅 Add to Calendar", fs: "⛶ Fullscreen"
    }
  };

  const userLang = (navigator.language || navigator.userLanguage).startsWith('ru') ? 'ru' : 'en';
  const t = dict[userLang];

  // Применяем переводы к DOM
  document.getElementById('loc-sub').textContent = t.sub;
  document.getElementById('loc-days').textContent = t.days;
  document.getElementById('loc-hours').textContent = t.hours;
  document.getElementById('loc-mins').textContent = t.mins;
  document.getElementById('loc-secs').textContent = t.secs;
  document.getElementById('loc-date').textContent = t.date;
  document.getElementById('loc-cel-title').textContent = t.celTitle;
  document.getElementById('loc-cel-sub').textContent = t.celSub;
  document.getElementById('cal-btn').textContent = t.cal;
  document.getElementById('fs-btn').textContent = t.fs;

  // ==============================================
  // СИНХРОНИЗАЦИЯ ВРЕМЕНИ С СЕРВЕРОМ
  // ==============================================
  let serverOffset = 0;
  // Пытаемся получить заголовок Date с сервера, чтобы юзер не накрутил время на ПК
  fetch(window.location.href, { method: 'HEAD', cache: 'no-cache' }).then(res => {
    const srvDate = res.headers.get('Date');
    if (srvDate) {
      serverOffset = new Date(srvDate).getTime() - Date.now();
    }
  }).catch(() => { /* Игнорируем ошибки (например при запуске локально) */ });

  function getRealTime() {
    return Date.now() + serverOffset;
  }

  // DOM Элементы
  const elDays = document.getElementById('t-days'), elHours = document.getElementById('t-hours');
  const elMins = document.getElementById('t-mins'), elSecs = document.getElementById('t-secs');
  const elDaysBlock = document.getElementById('days-block'), elSepDH = document.getElementById('sep-dh');
  const elCountdown = document.getElementById('countdown-section'), elCelebrate = document.getElementById('celebrate-section');
  const elBg = document.getElementById('bg'), elTimerContainer = document.getElementById('timer');
  const elA11y = document.getElementById('a11y-text');
  const canvas = document.getElementById('fireworks-canvas'), ctx = canvas.getContext('2d');
  
  // Аудио
  const audioAmbient = document.getElementById('audio-ambient');
  const audioRelease = document.getElementById('audio-release');
  const soundBtn = document.getElementById('sound-btn');
  let soundEnabled = false;

  soundBtn.addEventListener('click', () => {
    soundEnabled = !soundEnabled;
    soundBtn.textContent = soundEnabled ? t.soundOn : t.soundOff;
    if (soundEnabled) {
      if (!released) audioAmbient.play().catch(()=>{});
      else audioRelease.play().catch(()=>{});
    } else {
      audioAmbient.pause();
      audioRelease.pause();
    }
  });

  // State
  let released = false, fireworksOn = false, isDramatic = false;
  let animId = null, tickInterval = null, launchTimer = null;

  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  // ==============================================
  // ГЕНЕРАЦИЯ ICS ДЛЯ КАЛЕНДАРЯ
  // ==============================================
  const icsData = `BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
DTSTART:20260319T220000Z
DTEND:20260320T020000Z
SUMMARY:Crimson Desert Release
DESCRIPTION:Play Crimson Desert!
END:VEVENT
END:VCALENDAR`;
  const calBlob = new Blob([icsData], { type: 'text/calendar;charset=utf-8' });
  document.getElementById('cal-btn').href = URL.createObjectURL(calBlob);

  // ==============================================
  // COUNTDOWN LOGIC
  // ==============================================
  function tick() {
    const diff = RELEASE_MS - getRealTime();

    if (diff <= 0) {
      if (!released) triggerRelease();
      return;
    }

    // Драматичные последние 10 секунд
    if (diff <= 10500 && !isDramatic) {
      isDramatic = true;
      elTimerContainer.classList.add('timer--dramatic');
      // Здесь можно включить звук биения сердца, если есть
    }

    const total = Math.floor(diff / 1000);
    const d = Math.floor(total / 86400), h = Math.floor((total % 86400) / 3600);
    const m = Math.floor((total % 3600) / 60), s = total % 60;

    if (d > 0) {
      elDaysBlock.style.display = ''; elSepDH.style.display = '';
      elDays.textContent = pad(d);
    } else {
      elDaysBlock.style.display = 'none'; elSepDH.style.display = 'none';
    }

    elHours.textContent = pad(h); elMins.textContent = pad(m); elSecs.textContent = pad(s);

    // Обновляем текст для скринридеров каждые 10 секунд
    if (s % 10 === 0 || total < 15) {
      elA11y.textContent = `${t.sub}: ${d} ${t.days}, ${h} ${t.hours}, ${m} ${t.mins}, ${s} ${t.secs}.`;
    }
  }

  function triggerRelease() {
    released = true;
    if (tickInterval) clearInterval(tickInterval);
    elCountdown.classList.add('hidden');
    elCelebrate.classList.remove('hidden');
    elBg.classList.add('bg--celebrate');
    
    if (soundEnabled) {
      audioAmbient.pause();
      audioRelease.play().catch(()=>{});
    }
    startFireworks();
  }

  // ==============================================
  // PARALLAX EFFECT
  // ==============================================
  document.addEventListener('mousemove', (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 2; // -1 to 1
    const y = (e.clientY / window.innerHeight - 0.5) * 2; // -1 to 1
    document.documentElement.style.setProperty('--mouse-x', x);
    document.documentElement.style.setProperty('--mouse-y', y);
  });

  // ==============================================
  // ОПТИМИЗИРОВАННЫЙ ДВИЖОК САЛЮТОВ (Object Pool)
  // ==============================================
  const COLORS = ['#ffcc44','#ff6633','#ff3366','#33ccff','#66ff66','#ff66cc','#ffaa00','#44ddff','#ff4444','#ffffff','#ffd700'];
  
  const particlePool = [], rocketPool = [];
  const activeParticles = [], activeRockets = [];

  function Particle() { this.trail = []; }
  Particle.prototype.init = function(x, y, color, vx, vy, sz, life) {
    this.x = x; this.y = y; this.color = color;
    this.vx = vx; this.vy = vy; this.sz = sz;
    this.life = life; this.max = life; this.trail.length = 0;
  };
  Particle.prototype.update = function() {
    this.trail.push({x:this.x, y:this.y, a:this.life/this.max});
    if (this.trail.length > 5) this.trail.shift();
    this.vy += 0.035; this.x += this.vx; this.y += this.vy;
    this.vx *= 0.985; this.vy *= 0.985; this.life--;
  };
  Particle.prototype.draw = function() {
    const a = Math.max(this.life/this.max, 0);
    for (let i=0; i<this.trail.length; i++) {
      const t = this.trail[i], ta = t.a * 0.25 * (i/this.trail.length);
      if (ta < 0.01) continue;
      ctx.globalAlpha = ta; ctx.fillStyle = this.color;
      ctx.beginPath(); ctx.arc(t.x, t.y, this.sz*0.5, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = a; ctx.fillStyle = this.color;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.sz*a, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = a * 0.12; ctx.beginPath(); ctx.arc(this.x, this.y, this.sz*a*3.5, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  };

  function Rocket() { this.trail = []; }
  Rocket.prototype.init = function(cw, ch) {
    this.x = cw*0.12 + Math.random()*cw*0.76; this.y = ch;
    this.ty = ch*0.08 + Math.random()*ch*0.35;
    this.vy = -(5.5 + Math.random()*4); this.vx = (Math.random()-0.5)*1.8;
    this.trail.length = 0; this.done = false;
  };
  Rocket.prototype.update = function() {
    this.trail.push({x:this.x, y:this.y});
    if (this.trail.length > 10) this.trail.shift();
    this.x += this.vx; this.y += this.vy; this.vy += 0.055;
    if (this.vy >= -0.5 || this.y <= this.ty) { this.explode(); this.done = true; }
  };
  Rocket.prototype.draw = function() {
    for (let i=0; i<this.trail.length; i++) {
      ctx.globalAlpha = (i/this.trail.length)*0.5; ctx.fillStyle = '#e8c47c';
      ctx.beginPath(); ctx.arc(this.trail[i].x, this.trail[i].y, 1.2, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1; ctx.fillStyle = '#fff8e0';
    ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI*2); ctx.fill();
  };
  Rocket.prototype.explode = function() {
    const c1 = COLORS[Math.floor(Math.random()*COLORS.length)], c2 = COLORS[Math.floor(Math.random()*COLORS.length)];
    const n = 60 + Math.floor(Math.random()*40);
    for (let i=0; i<n; i++) {
      const ang = (Math.PI*2/n)*i + (Math.random()*0.15), sp = 1.5 + Math.random()*4.5;
      const p = particlePool.length > 0 ? particlePool.pop() : new Particle();
      p.init(this.x, this.y, Math.random()>0.5?c1:c2, Math.cos(ang)*sp, Math.sin(ang)*sp, 1.2+Math.random()*2, 45+Math.floor(Math.random()*30));
      activeParticles.push(p);
    }
  };

  function spawnRocket() {
    const r = rocketPool.length > 0 ? rocketPool.pop() : new Rocket();
    r.init(canvas.width, canvas.height);
    activeRockets.push(r);
  }

  function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

  function fwLoop() {
    if (!fireworksOn) return;
    ctx.globalCompositeOperation = 'destination-out';
    ctx.globalAlpha = 0.15; ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = 1;

    for (let i = activeRockets.length - 1; i >= 0; i--) {
      const r = activeRockets[i]; r.update();
      if (!r.done) r.draw();
      else { activeRockets.splice(i, 1); rocketPool.push(r); }
    }
    for (let i = activeParticles.length - 1; i >= 0; i--) {
      const p = activeParticles[i]; p.update();
      if (p.life > 0) p.draw();
      else { activeParticles.splice(i, 1); particlePool.push(p); }
    }
    ctx.globalCompositeOperation = 'source-over';
    animId = requestAnimationFrame(fwLoop);
  }

  function scheduleLaunch() {
    if (!fireworksOn) return;
    const n = 1 + Math.floor(Math.random()*3);
    for (let i=0; i<n; i++) setTimeout(() => { if(fireworksOn) spawnRocket(); }, i*250);
    launchTimer = setTimeout(scheduleLaunch, 800 + Math.random()*1200);
  }

  function startFireworks() {
    fireworksOn = true; resizeCanvas();
    for(let i=0; i<5; i++) setTimeout(() => { if(fireworksOn) spawnRocket(); }, i*200);
    fwLoop(); setTimeout(scheduleLaunch, 1500);
  }

  // ==============================================
  // ИНИЦИАЛИЗАЦИЯ
  // ==============================================
  window.addEventListener('resize', resizeCanvas);
  
  // Создание искр (Embers)
  const embersBox = document.getElementById('embers');
  for (let i = 0; i < 25; i++) {
    const el = document.createElement('div'); el.className = 'ember';
    const sz = (1.5 + Math.random() * 3) + 'px';
    el.style.width = sz; el.style.height = sz; el.style.left = (Math.random() * 100) + '%';
    const dur = 7 + Math.random() * 11; el.style.animationDuration = dur + 's'; el.style.animationDelay = (Math.random() * dur) + 's';
    el.style.setProperty('--drift', (Math.random() * 70 - 35) + 'px');
    const r = 200+Math.random()*55, g = 120+Math.random()*80, b = 30+Math.random()*50;
    el.style.background = `rgba(${r},${g},${b},${0.4+Math.random()*0.5})`;
    el.style.boxShadow = `0 0 ${3+Math.random()*4}px rgba(${r},${g},${b},0.4)`;
    embersBox.appendChild(el);
  }

  // Запуск
  if (getRealTime() >= RELEASE_MS) triggerRelease();
  else { tick(); tickInterval = setInterval(tick, 250); }

  // Fullscreen логика
  const fsBtn = document.getElementById('fs-btn');
  function toggleFS() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
    else document.exitFullscreen();
  }
  fsBtn.addEventListener('click', toggleFS);

})();
</script>
</body>

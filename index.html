<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CRIMSON DESERT — Обратный Отсчёт</title>
<style>
  /*
   * ========================================
   * CRIMSON DESERT COUNTDOWN
   * Release: 20 March 2026, 01:00 MSK
   * = 19 March 2026, 22:00:00 UTC
   * ========================================
   */

  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #080604;
    font-family: 'Cinzel', 'Georgia', 'Times New Roman', serif;
    cursor: default;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* === BACKGROUND LAYERS === */
  .bg {
    position: fixed;
    inset: -40px;
    z-index: 0;
    background-color: #080604;
    background-image: url('bg2.webp');
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
    filter: brightness(0.72) saturate(1.25);
    transition: filter 2s ease, transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    will-change: transform;
  }
  .bg--celebrate {
    filter: brightness(0.82) saturate(1.4);
  }

  .overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: linear-gradient(
      180deg,
      rgba(8, 4, 0, 0.45) 0%,
      rgba(8, 4, 0, 0.10) 35%,
      rgba(8, 4, 0, 0.12) 65%,
      rgba(8, 4, 0, 0.60) 100%
    );
    pointer-events: none;
  }

  .vignette {
    position: fixed;
    inset: 0;
    z-index: 2;
    box-shadow: inset 0 0 180px rgba(0, 0, 0, 0.45);
    pointer-events: none;
  }

  /* === EMBERS === */
  .embers {
    position: fixed;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    overflow: hidden;
  }
  .ember {
    position: absolute;
    bottom: -10px;
    border-radius: 50%;
    will-change: transform, opacity;
    animation: ember-rise linear infinite;
  }
  @keyframes ember-rise {
    0% {
      transform: translateY(0) translateX(0) scale(1);
      opacity: 0;
    }
    8% { opacity: 0.9; }
    85% { opacity: 0.5; }
    100% {
      transform:
        translateY(calc(-100vh - 30px))
        translateX(var(--drift))
        scale(0.2);
      opacity: 0;
    }
  }

  /* === FIREWORKS CANVAS === */
  #fireworks-canvas {
    position: fixed;
    inset: 0;
    z-index: 5;
    pointer-events: none;
  }

  /* === MAIN CONTENT === */
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    text-align: center;
    color: #fff;
    padding: 1rem;
  }

  /* --- Countdown State --- */
  .countdown-section {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .countdown-section[hidden] {
    display: none !important;
  }

  .logo {
    font-weight: 900;
    font-size: clamp(1.8rem, 5.5vw, 4.5rem);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #e8c47c;
    text-shadow:
      0 0 40px rgba(200, 140, 50, 0.45),
      0 0 80px rgba(200, 100, 30, 0.25),
      0 2px 4px rgba(0, 0, 0, 0.8);
    margin-bottom: 0.15em;
    animation: fade-in-down 1s ease-out both;
  }

  .subtitle {
    font-weight: 400;
    font-size: clamp(0.65rem, 1.8vw, 1.1rem);
    color: rgba(232, 196, 124, 0.65);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    margin-bottom: 1.8em;
    animation: fade-in-down 1s 0.25s ease-out both;
  }

  .timer {
    display: flex;
    align-items: flex-start;
    gap: clamp(0.5rem, 2.5vw, 2rem);
    animation: fade-in-up 1s 0.5s ease-out both;
  }

  .timer-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: clamp(50px, 11vw, 110px);
  }

  .timer-value {
    font-weight: 900;
    font-size: clamp(2.2rem, 7.5vw, 5.5rem);
    color: #fff;
    line-height: 1;
    text-shadow:
      0 0 25px rgba(200, 100, 30, 0.35),
      0 2px 6px rgba(0, 0, 0, 0.6);
    position: relative;
    font-variant-numeric: tabular-nums;
    min-width: 1.3em;
    text-align: center;
  }
  .timer-value::after {
    content: '';
    position: absolute;
    bottom: -3px;
    left: 15%;
    right: 15%;
    height: 1.5px;
    background: linear-gradient(90deg, transparent, rgba(232, 196, 124, 0.45), transparent);
  }

  .timer-label {
    font-size: clamp(0.5rem, 1.2vw, 0.78rem);
    color: rgba(232, 196, 124, 0.55);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-top: 0.65em;
  }

  .timer-sep {
    font-size: clamp(1.8rem, 5.5vw, 3.5rem);
    color: rgba(232, 196, 124, 0.35);
    margin-top: 0.08em;
    animation: sep-pulse 1.5s ease-in-out infinite;
    user-select: none;
  }

  .release-date {
    font-size: clamp(0.6rem, 1.3vw, 0.85rem);
    color: rgba(255, 255, 255, 0.4);
    letter-spacing: 0.15em;
    margin-top: 2em;
    animation: fade-in-up 1s 0.75s ease-out both;
  }

  /* --- Celebration State --- */
  .celebrate-section {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .celebrate-section[hidden] {
    display: none !important;
  }

  .celebrate-title {
    font-weight: 900;
    font-size: clamp(1.6rem, 5.5vw, 4.2rem);
    color: #ffcc44;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    line-height: 1.15;
    text-shadow:
      0 0 50px rgba(255, 180, 50, 0.65),
      0 0 100px rgba(255, 120, 30, 0.35),
      0 0 150px rgba(255, 80, 20, 0.15),
      0 4px 8px rgba(0, 0, 0, 0.8);
    animation:
      celebrate-in 0.9s ease-out both,
      glow-pulse 1.8s 0.9s ease-in-out infinite alternate;
  }

  .celebrate-sub {
    font-size: clamp(0.9rem, 2.5vw, 1.6rem);
    color: rgba(255, 220, 130, 0.8);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 0.5em;
    animation: fade-in-up 0.8s 0.3s ease-out both;
  }

  .celebrate-emoji {
    font-size: clamp(1.8rem, 4.5vw, 3.5rem);
    margin-top: 0.5em;
    animation: fade-in-up 0.8s 0.5s ease-out both;
  }

  /* === FULLSCREEN BUTTON === */
  .fs-btn {
    position: fixed;
    bottom: 1.2rem;
    right: 1.2rem;
    z-index: 100;
    background: rgba(232, 196, 124, 0.12);
    border: 1px solid rgba(232, 196, 124, 0.25);
    color: rgba(232, 196, 124, 0.75);
    font-family: 'Cinzel', 'Georgia', serif;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.55em 1.1em;
    cursor: pointer;
    border-radius: 3px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: opacity 0.4s, background 0.3s, border-color 0.3s, color 0.3s;
    user-select: none;
  }
  .fs-btn:hover {
    background: rgba(232, 196, 124, 0.22);
    border-color: rgba(232, 196, 124, 0.45);
    color: #e8c47c;
  }
  .fs-btn:active {
    transform: scale(0.97);
  }
  .fs-btn--hidden {
    opacity: 0;
    pointer-events: none;
  }

  /* === ANIMATIONS === */
  @keyframes fade-in-down {
    from { opacity: 0; transform: translateY(-25px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fade-in-up {
    from { opacity: 0; transform: translateY(25px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes sep-pulse {
    0%, 100% { opacity: 0.35; }
    50%      { opacity: 0.75; }
  }
  @keyframes celebrate-in {
    from { opacity: 0; transform: scale(0.65); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes glow-pulse {
    from {
      text-shadow:
        0 0 40px rgba(255, 180, 50, 0.5),
        0 0 80px rgba(255, 120, 30, 0.25),
        0 4px 8px rgba(0, 0, 0, 0.8);
    }
    to {
      text-shadow:
        0 0 70px rgba(255, 180, 50, 0.75),
        0 0 140px rgba(255, 120, 30, 0.45),
        0 0 180px rgba(255, 80, 20, 0.2),
        0 4px 8px rgba(0, 0, 0, 0.8);
    }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="bg" id="bg"></div>
<div class="overlay"></div>
<div class="vignette"></div>
<div class="embers" id="embers"></div>
<canvas id="fireworks-canvas"></canvas>

<div class="content">
  <!-- Countdown -->
  <div class="countdown-section" id="countdown-section">
    <div class="logo">Crimson Desert</div>
    <div class="subtitle">До выхода осталось</div>
    <div class="timer" id="timer">
      <div class="timer-block" id="days-block">
        <div class="timer-value" id="t-days">00</div>
        <div class="timer-label">Дней</div>
      </div>
      <div class="timer-sep" id="sep-dh">:</div>
      <div class="timer-block">
        <div class="timer-value" id="t-hours">00</div>
        <div class="timer-label">Часов</div>
      </div>
      <div class="timer-sep">:</div>
      <div class="timer-block">
        <div class="timer-value" id="t-mins">00</div>
        <div class="timer-label">Минут</div>
      </div>
      <div class="timer-sep">:</div>
      <div class="timer-block">
        <div class="timer-value" id="t-secs">00</div>
        <div class="timer-label">Секунд</div>
      </div>
    </div>
    <div class="release-date">20 марта 2026 · 01:00 МСК</div>
  </div>

  <!-- Celebration -->
  <div class="celebrate-section" id="celebrate-section" hidden>
    <div class="celebrate-title">Быстро всем играть!</div>
    <div class="celebrate-sub">Crimson Desert вышла!</div>
    <div class="celebrate-emoji">⚔️🔥🐉</div>
  </div>
</div>

<button class="fs-btn" id="fs-btn" type="button">⛶ На весь экран</button>

<script>
(function() {
  'use strict';

  // ==============================================
  // RELEASE: 19 March 2026 22:00:00 UTC
  //        = 20 March 2026 01:00:00 MSK
  //
  // Date.UTC(year, monthIndex, day, h, m, s)
  // monthIndex 0-based: 2 = March
  //
  // Date.now() returns UTC ms on EVERY browser.
  // So the countdown is timezone-independent
  // and identical on all devices worldwide.
  // ==============================================
  var RELEASE_MS = Date.UTC(2026, 2, 19, 22, 0, 0);

  // DOM
  var elDays      = document.getElementById('t-days');
  var elHours     = document.getElementById('t-hours');
  var elMins      = document.getElementById('t-mins');
  var elSecs      = document.getElementById('t-secs');
  var elDaysBlock = document.getElementById('days-block');
  var elSepDH     = document.getElementById('sep-dh');
  var elCountdown = document.getElementById('countdown-section');
  var elCelebrate = document.getElementById('celebrate-section');
  var elBg        = document.getElementById('bg');
  var elFsBtn     = document.getElementById('fs-btn');
  var canvas      = document.getElementById('fireworks-canvas');
  var ctx         = canvas.getContext('2d');

  // State
  var released       = false;
  var fireworksOn     = false;
  var particles       = [];
  var rockets         = [];
  var animId          = null;
  var tickInterval    = null;
  var launchTimer     = null;

  // Utility
  function pad(n) {
    return n < 10 ? '0' + n : '' + n;
  }

  // ==============================================
  // COUNTDOWN
  // ==============================================
  function tick() {
    var diff = RELEASE_MS - Date.now();

    if (diff <= 0) {
      if (!released) triggerRelease();
      return;
    }

    var total = Math.floor(diff / 1000);
    var d = Math.floor(total / 86400);
    var h = Math.floor((total % 86400) / 3600);
    var m = Math.floor((total % 3600) / 60);
    var s = total % 60;

    // Show days only when > 0
    if (d > 0) {
      elDaysBlock.style.display = '';
      elSepDH.style.display = '';
      elDays.textContent = pad(d);
    } else {
      elDaysBlock.style.display = 'none';
      elSepDH.style.display = 'none';
    }

    elHours.textContent = pad(h);
    elMins.textContent  = pad(m);
    elSecs.textContent  = pad(s);
  }

  function startTick() {
    tick();
    // 250ms interval catches second transitions precisely
    tickInterval = setInterval(tick, 250);
  }

  // ==============================================
  // RELEASE TRIGGER
  // ==============================================
  function triggerRelease() {
    released = true;
    if (tickInterval) {
      clearInterval(tickInterval);
      tickInterval = null;
    }
    elCountdown.setAttribute('hidden', '');
    elCelebrate.removeAttribute('hidden');
    elBg.classList.add('bg--celebrate');
    startFireworks();
  }

  // ==============================================
  // FULLSCREEN (cross-browser)
  // ==============================================
  function goFS() {
    var el = document.documentElement;
    var fn = el.requestFullscreen || el.webkitRequestFullscreen
          || el.mozRequestFullScreen || el.msRequestFullscreen;
    if (fn) fn.call(el).catch(function() {});
  }

  function exitFS() {
    var fn = document.exitFullscreen || document.webkitExitFullscreen
          || document.mozCancelFullScreen || document.msExitFullscreen;
    if (fn) fn.call(document).catch(function() {});
  }

  function isFS() {
    return !!(document.fullscreenElement || document.webkitFullscreenElement
           || document.mozFullScreenElement || document.msFullscreenElement);
  }

  function onFSChange() {
    if (isFS()) {
      elFsBtn.classList.add('fs-btn--hidden');
    } else {
      elFsBtn.classList.remove('fs-btn--hidden');
    }
  }

  elFsBtn.addEventListener('click', function() {
    if (isFS()) exitFS(); else goFS();
  });

  document.addEventListener('fullscreenchange', onFSChange);
  document.addEventListener('webkitfullscreenchange', onFSChange);
  document.addEventListener('mozfullscreenchange', onFSChange);
  document.addEventListener('MSFullscreenChange', onFSChange);

  // ==============================================
  // EMBERS (pure CSS animation)
  // ==============================================
  function createEmbers() {
    var box = document.getElementById('embers');
    for (var i = 0; i < 20; i++) {
      var el = document.createElement('div');
      el.className = 'ember';
      var sz = (1.5 + Math.random() * 3) + 'px';
      el.style.width = sz;
      el.style.height = sz;
      el.style.left = (Math.random() * 100) + '%';
      var dur = 7 + Math.random() * 11;
      el.style.animationDuration = dur + 's';
      el.style.animationDelay = (Math.random() * dur) + 's';
      el.style.setProperty('--drift', (Math.random() * 70 - 35) + 'px');
      var r = 200 + Math.floor(Math.random() * 55);
      var g = 120 + Math.floor(Math.random() * 80);
      var b = 30  + Math.floor(Math.random() * 50);
      el.style.background = 'rgba('+r+','+g+','+b+','+(0.4+Math.random()*0.5)+')';
      el.style.boxShadow = '0 0 '+(3+Math.random()*4)+'px rgba('+r+','+g+','+b+',0.4)';
      box.appendChild(el);
    }
  }

  // ==============================================
  // FIREWORKS ENGINE
  // ==============================================
  var COLORS = [
    '#ffcc44','#ff6633','#ff3366','#33ccff',
    '#66ff66','#ff66cc','#ffaa00','#44ddff',
    '#ff4444','#ffdd88','#bb66ff','#44ff88',
    '#ff8844','#ffffff','#ffd700'
  ];

  function Particle(x,y,color,vx,vy,sz,life) {
    this.x=x; this.y=y; this.color=color;
    this.vx=vx; this.vy=vy; this.sz=sz;
    this.life=life; this.max=life; this.trail=[];
  }
  Particle.prototype.update = function() {
    this.trail.push({x:this.x, y:this.y, a:this.life/this.max});
    if (this.trail.length > 5) this.trail.shift();
    this.vy += 0.035;
    this.x += this.vx; this.y += this.vy;
    this.vx *= 0.985; this.vy *= 0.985;
    this.life--;
  };
  Particle.prototype.draw = function() {
    var a = Math.max(this.life/this.max, 0);
    for (var i=0; i<this.trail.length; i++) {
      var t=this.trail[i];
      var ta=t.a*0.25*(i/this.trail.length);
      if (ta<0.01) continue;
      ctx.globalAlpha=ta;
      ctx.fillStyle=this.color;
      ctx.beginPath();
      ctx.arc(t.x,t.y,this.sz*0.5,0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha=a;
    ctx.fillStyle=this.color;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.sz*a,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=a*0.12;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.sz*a*3.5,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
  };

  function Rocket(cw,ch) {
    this.x=cw*0.12+Math.random()*cw*0.76;
    this.y=ch;
    this.ty=ch*0.08+Math.random()*ch*0.35;
    this.vy=-(5.5+Math.random()*4);
    this.vx=(Math.random()-0.5)*1.8;
    this.trail=[]; this.done=false;
  }
  Rocket.prototype.update = function() {
    this.trail.push({x:this.x, y:this.y});
    if (this.trail.length>10) this.trail.shift();
    this.x+=this.vx; this.y+=this.vy; this.vy+=0.055;
    if (this.vy>=-0.5||this.y<=this.ty) {
      this.explode(); this.done=true;
    }
  };
  Rocket.prototype.draw = function() {
    for (var i=0;i<this.trail.length;i++) {
      ctx.globalAlpha=(i/this.trail.length)*0.5;
      ctx.fillStyle='#e8c47c';
      ctx.beginPath();
      ctx.arc(this.trail[i].x,this.trail[i].y,1.2,0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha=1;
    ctx.fillStyle='#fff8e0';
    ctx.beginPath();
    ctx.arc(this.x,this.y,2,0,Math.PI*2);
    ctx.fill();
  };
  Rocket.prototype.explode = function() {
    var c1=COLORS[Math.floor(Math.random()*COLORS.length)];
    var c2=COLORS[Math.floor(Math.random()*COLORS.length)];
    var n=70+Math.floor(Math.random()*50);
    for (var i=0;i<n;i++) {
      var ang=(Math.PI*2/n)*i+(Math.random()*0.15);
      var sp=1.5+Math.random()*4.5;
      particles.push(new Particle(
        this.x,this.y,
        Math.random()>0.5?c1:c2,
        Math.cos(ang)*sp, Math.sin(ang)*sp,
        1.2+Math.random()*2, 55+Math.floor(Math.random()*35)
      ));
    }
  };

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function fwLoop() {
    if (!fireworksOn) return;
    ctx.globalCompositeOperation='destination-out';
    ctx.globalAlpha=0.12;
    ctx.fillStyle='#000';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.globalCompositeOperation='lighter';
    ctx.globalAlpha=1;

    var i=rockets.length;
    while(i--) {
      rockets[i].update();
      if (!rockets[i].done) rockets[i].draw();
      else rockets.splice(i,1);
    }
    i=particles.length;
    while(i--) {
      particles[i].update();
      if (particles[i].life>0) particles[i].draw();
      else particles.splice(i,1);
    }
    ctx.globalCompositeOperation='source-over';
    animId=requestAnimationFrame(fwLoop);
  }

  function scheduleLaunch() {
    if (!fireworksOn) return;
    var n=1+Math.floor(Math.random()*3);
    for (var i=0;i<n;i++) {
      (function(d){
        setTimeout(function(){
          if(fireworksOn) rockets.push(new Rocket(canvas.width,canvas.height));
        },d);
      })(i*250);
    }
    launchTimer=setTimeout(scheduleLaunch, 800+Math.random()*1200);
  }

  function startFireworks() {
    fireworksOn=true;
    resizeCanvas();
    for(var i=0;i<5;i++){
      (function(d){
        setTimeout(function(){
          if(fireworksOn) rockets.push(new Rocket(canvas.width,canvas.height));
        },d);
      })(i*200);
    }
    fwLoop();
    setTimeout(scheduleLaunch,1500);
  }

  // ==============================================
  // RESIZE (debounced)
  // ==============================================
  var resizeT=null;
  window.addEventListener('resize',function(){
    clearTimeout(resizeT);
    resizeT=setTimeout(resizeCanvas,100);
  });

  // ==============================================
  // VISIBILITY API (save battery when tab hidden)
  // ==============================================
  document.addEventListener('visibilitychange',function(){
    if(document.hidden){
      if(animId){cancelAnimationFrame(animId);animId=null;}
    } else {
      tick(); // sync immediately on return
      if(fireworksOn&&!animId) fwLoop();
    }
  });

  // ==============================================
  // MOUSE PARALLAX (smooth background movement)
  // ==============================================
  var mouseX = 0.5, mouseY = 0.5;
  var currentX = 0.5, currentY = 0.5;
  var parallaxActive = true;
  var PARALLAX_STRENGTH = 20; // px max offset

  document.addEventListener('mousemove', function(e) {
    mouseX = e.clientX / window.innerWidth;
    mouseY = e.clientY / window.innerHeight;
  });

  // Touch support
  document.addEventListener('touchmove', function(e) {
    if (e.touches.length > 0) {
      mouseX = e.touches[0].clientX / window.innerWidth;
      mouseY = e.touches[0].clientY / window.innerHeight;
    }
  }, { passive: true });

  function parallaxLoop() {
    if (!parallaxActive) return;
    // Lerp for smoothness
    currentX += (mouseX - currentX) * 0.04;
    currentY += (mouseY - currentY) * 0.04;

    var offsetX = (currentX - 0.5) * PARALLAX_STRENGTH;
    var offsetY = (currentY - 0.5) * PARALLAX_STRENGTH;

    elBg.style.transform = 'translate(' + offsetX + 'px, ' + offsetY + 'px) scale(1.05)';
    requestAnimationFrame(parallaxLoop);
  }
  parallaxLoop();

  // ==============================================
  // INIT
  // ==============================================
  createEmbers();
  resizeCanvas();
  if(Date.now()>=RELEASE_MS){
    triggerRelease();
  } else {
    startTick();
  }

})();
</script>
</body>
